# Neighborhood Library — Docker Compose topology.
#
# Brings up the four services described in docs/design/05-infrastructure.md:
#   postgres  — Postgres 16 with the `library` database.
#   api       — Python 3.12 gRPC server: 12 RPCs across BookService,
#               MemberService, and LoanService, plus the standard health
#               and reflection services.
#   envoy     — gRPC-Web -> native gRPC translator on :8080, admin on :9901.
#   web       — Next.js dev server on :3000 (frontend agent owns its Dockerfile).
#
# Demo data is opt-in via the `DEMO_MODE` environment variable, not a
# Compose profile: `DEMO_MODE=true docker compose up` truncates and
# reseeds the database on api startup. See backend/entrypoint.sh and
# backend/scripts/reset_and_seed.py.
#
# A second profile, `observability` (Phase 5.5b), brings up a self-hosted
# SigNoz instance — clickhouse, signoz-otel-collector, query-service, frontend.
# Activated with:
#   docker compose --env-file .env.observability --profile observability up
# UI is at http://localhost:3301 once query-service has finished its
# first-run schema migration (~30s).
#
# Ports owned by this stack on the host: 5432, 50051, 8080, 9901, 3000,
# plus 3301, 4317, 4318 when the observability profile is active.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend
      additional_contexts:
        # Proto sits at the repo root so backend and frontend codegen consume
        # one source of truth. Exposed to the build via a named build context
        # (Compose v2 / BuildKit feature) so the per-service `context:` stays
        # focused on its own subtree.
        proto: ./proto
    image: neighborhood-library/api:dev
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/library
      GRPC_PORT: "50051"
      DEFAULT_LOAN_DAYS: "14"
      FINE_GRACE_DAYS: "14"
      FINE_PER_DAY_CENTS: "25"
      FINE_CAP_CENTS: "2000"
      # OpenTelemetry — see docs/design/06-observability.md §8.4 for the full
      # contract. Defaults match Phase 5.5 (console exporter); Phase 5.5b
      # ships the SigNoz overlay and overrides via .env.observability so
      # OTEL_*_EXPORTER flips to "otlp" and the endpoint resolves.
      OTEL_SERVICE_NAME: "library-api"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=library,deployment.environment=local"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-console}"
      OTEL_LOGS_EXPORTER: "${OTEL_LOGS_EXPORTER:-console}"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      # Phase 5.6 resilience — db timeouts and pool tuning. These are the
      # production-sane defaults; tests override them via env to surface
      # failures faster (lower lock_timeout, smaller pool, etc.).
      DB_STATEMENT_TIMEOUT_MS: "${DB_STATEMENT_TIMEOUT_MS:-5000}"
      DB_LOCK_TIMEOUT_MS: "${DB_LOCK_TIMEOUT_MS:-3000}"
      DB_IDLE_TX_TIMEOUT_MS: "${DB_IDLE_TX_TIMEOUT_MS:-15000}"
      DB_POOL_SIZE: "${DB_POOL_SIZE:-10}"
      DB_MAX_OVERFLOW: "${DB_MAX_OVERFLOW:-10}"
      DB_POOL_TIMEOUT_S: "${DB_POOL_TIMEOUT_S:-5}"
      DB_POOL_RECYCLE_S: "${DB_POOL_RECYCLE_S:-1800}"
      DB_COMMAND_TIMEOUT_S: "${DB_COMMAND_TIMEOUT_S:-5}"
      # Phase 7 — DEMO_MODE. When "true", entrypoint.sh truncates all tables
      # and reseeds them from backend/scripts/reset_and_seed.py before the
      # gRPC server starts. Default is "false" so a vanilla `docker compose
      # up` brings up an empty production-style stack. Activate the demo
      # fixture with: `DEMO_MODE=true docker compose up`.
      DEMO_MODE: "${DEMO_MODE:-false}"
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The Phase 1 stub registers the standard grpc.health.v1.Health service,
      # so this probe succeeds as soon as the gRPC server is bound. Per-service
      # health entries (BookService / MemberService / LoanService) get
      # published once the business servicers are wired in.
      test: ["CMD", "grpc_health_probe", "-addr=127.0.0.1:50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./deploy/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      api:
        condition: service_started
    healthcheck:
      # The official envoyproxy/envoy:* images don't ship wget, curl, or nc —
      # only bash and sh. We use bash's built-in /dev/tcp pseudo-device to
      # probe the admin port. If envoy is binding :9901 the connect succeeds
      # and bash exits 0; if envoy isn't listening it errors out non-zero.
      # This is a TCP-level liveness check rather than an HTTP /ready probe,
      # which is sufficient as a startup gate — envoy doesn't bind admin
      # until config is parsed and the static clusters are initialized.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9901"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    # The frontend agent owns frontend/Dockerfile and the package.json / Next.js
    # scaffold inside ./frontend. Contract this service requires from them:
    #   - `./frontend/Dockerfile` exists and produces an image that listens on :3000
    #   - the home page is served at `/`
    #   - NEXT_PUBLIC_API_BASE_URL is consumed at build/runtime as the
    #     gRPC-Web base URL.
    build:
      context: ./frontend
      additional_contexts:
        proto: ./proto
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      envoy:
        condition: service_started

  grpcui:
    # Interactive web UI for the gRPC API — the closest thing to "swagger
    # for gRPC." Uses server reflection (which our backend has registered)
    # to discover services + methods + message shapes. You can fill in
    # request fields in a form and call the RPC, just like Swagger UI.
    #
    # Browse it at http://localhost:8082 once `docker compose up` is healthy.
    #
    # Note: grpcui talks NATIVE gRPC to the api container directly (not
    # through Envoy), so it bypasses the gRPC-Web translation layer. It's
    # for API exploration, not for verifying the browser's wire path.
    image: fullstorydev/grpcui:latest
    command: ["-port=8080", "-plaintext", "-bind=0.0.0.0", "api:50051"]
    ports:
      - "8082:8080"
    depends_on:
      api:
        condition: service_healthy

  # ---------- observability profile (Phase 5.5b) ----------
  #
  # SigNoz local backend. Gated behind `profiles: ["observability"]` so
  # `docker compose up` (no profile) does not start any of these services.
  #
  # Architecture follows SigNoz's canonical compose layout (as of v0.122.0):
  #     https://github.com/SigNoz/signoz/blob/main/deploy/docker/docker-compose.yaml
  #
  # SigNoz consolidated the previously-separate `query-service` and
  # `frontend` containers into a single `signoz/signoz` image — the API,
  # SPA, and query logic now ship together. The four running services are:
  #
  #   signoz-zookeeper             — ClickHouse coordination
  #   signoz-clickhouse            — telemetry storage
  #   signoz-otel-collector        — OTLP receiver, writes to ClickHouse
  #   signoz                       — unified API + UI
  #
  # Plus a one-shot `signoz-telemetrystore-migrator` that bootstraps the
  # ClickHouse schemas and exits.

  signoz-zookeeper:
    profiles: ["observability"]
    image: zookeeper:3.7
    environment:
      ZOO_MY_ID: "1"
      ZOO_SERVERS: "server.1=0.0.0.0:2888:3888;2181"
      ZOO_4LW_COMMANDS_WHITELIST: "*"
    volumes:
      - signoz-zookeeper:/data
    restart: on-failure

  signoz-clickhouse:
    profiles: ["observability"]
    image: clickhouse/clickhouse-server:25.8-alpine
    # The unified `signoz` server's opamp config-server pushes a collector
    # config that references hostname `clickhouse:9000` (SigNoz's upstream
    # default). Our service is named `signoz-clickhouse` for clarity, so we
    # also publish a `clickhouse` alias on the default network — without it
    # the otel-collector loops on "lookup clickhouse: no such host" and no
    # spans land in ClickHouse.
    networks:
      default:
        aliases:
          - clickhouse
    volumes:
      - signoz-clickhouse:/var/lib/clickhouse
      - ./deploy/signoz/clickhouse-users.xml:/etc/clickhouse-server/users.d/library.xml:ro
      - ./deploy/signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    depends_on:
      - signoz-zookeeper
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure

  signoz-telemetrystore-migrator:
    # One-shot: bootstraps the ClickHouse schemas (signoz_traces / signoz_logs /
    # signoz_metrics / signoz_meter) then exits. Same image as the collector,
    # different command. Replaces the deprecated `signoz/signoz-schema-migrator`.
    profiles: ["observability"]
    image: signoz/signoz-otel-collector:v0.144.4
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: on-failure

  signoz-otel-collector:
    # Receives OTLP traces/logs from the api on :4317 (gRPC) / :4318 (HTTP)
    # and writes to ClickHouse. The first command is a "schema is migrated?"
    # check that fails fast if telemetrystore-migrator hasn't completed.
    profiles: ["observability"]
    image: signoz/signoz-otel-collector:v0.144.4
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector \
          --config=/etc/otel-collector-config.yaml \
          --manager-config=/etc/manager-config.yaml \
          --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./deploy/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./deploy/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml:ro
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    ports:
      - "4317:4317"   # OTLP gRPC — what the api exports to
      - "4318:4318"   # OTLP HTTP
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    restart: on-failure

  signoz:
    # The unified SigNoz image. Exposes the SPA + API on internal :8080.
    # We map host :3301 for compat with prior docs; the UI is at
    # http://localhost:3301 once healthy.
    #
    # SQLite (auth, dashboards, alerts, prefs) is in /var/lib/signoz/.
    # Telemetry data lives in ClickHouse.
    profiles: ["observability"]
    image: signoz/signoz:v0.122.0
    ports:
      - "3301:8080"
    volumes:
      - signoz-data:/var/lib/signoz/
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: secret
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  pgdata:
  signoz-clickhouse:
  signoz-data:
  signoz-zookeeper:
