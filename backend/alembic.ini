# Alembic config for the Neighborhood Library backend.
#
# Notes:
#   * sqlalchemy.url is intentionally NOT set here. ``alembic/env.py`` reads
#     ``DATABASE_URL`` from the application's Pydantic settings so there is a
#     single source of truth. Setting it here would either duplicate that or
#     silently override it.
#   * script_location is relative to the directory in which alembic is
#     invoked (the working dir at container start is /app, which is also
#     where this file lives — the entrypoint runs ``alembic upgrade head``
#     from /app).
#   * Logging is left at sane defaults — Alembic's loggers integrate with the
#     stdlib logging config the app sets up in ``library.main``.

[alembic]
script_location = alembic
prepend_sys_path = .
# Migration filenames: a 4-digit zero-padded revision-id-prefix (we use
# 0001, 0002, ...) plus a slug. Matching the canonical naming in the design
# doc rather than alembic's date-based default.
file_template = %%(rev)s_%%(slug)s
# Source rev IDs are short hex by default; we override to use the rev field
# of the migration file as-is (so ``revision = "0001"`` stays as ``0001``).
truncate_slug_length = 40
# Async migrations: env.py uses ``connection.run_sync(...)`` itself; we don't
# need transaction_per_migration here because we drive the connection
# explicitly. Leaving as default (one transaction wraps all migrations) is
# fine for our small migration set.

# ------------------------------------------------------------------------
# Logging — minimal config; stdlib root logger handles formatting.
# ------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
